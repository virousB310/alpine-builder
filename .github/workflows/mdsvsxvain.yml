name: Build VXLinux Kernel v1.0 hhhhhhhh 

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gcc-arm-linux-gnueabihf \
          g++-arm-linux-gnueabihf \
          bison flex libncurses-dev libssl-dev libelf-dev \
          bc cpio u-boot-tools rsync kmod xz-utils wget curl gettext zip

    - name: Download Linux Kernel 6.6 LTS
      run: |
        KERNEL_VERSION="6.6.61"
        # استخدام wget لحفظ الملف المحلي وإمكانية التتبع
        wget -q https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${KERNEL_VERSION}.tar.xz
        tar -xJf linux-${KERNEL_VERSION}.tar.xz
        mv linux-${KERNEL_VERSION} linux-src

    - name: Configure Kernel (QEMU ARM Virt)
      run: |
        cd linux-src
        export ARCH=arm
        export CROSS_COMPILE=arm-linux-gnueabihf-
        
        # تنظيف بيئة البناء لضمان تكوين نقي
        make mrproper

        # استخدام multi_v7_defconfig كقاعدة أساسية
        make multi_v7_defconfig

        # تخصيص خيارات النواة حسب مواصفات VXLinux
        scripts/config --enable CONFIG_EXPERT
        
        # تعطيل التعريفات غير الضرورية مع حذف الخيارات الخاطئة
        scripts/config --disable CONFIG_WIRELESS
        scripts/config --disable CONFIG_BT
        scripts/config --disable CONFIG_SOUND
        scripts/config --disable CONFIG_DRM
        scripts/config --disable CONFIG_MEDIA_SUPPORT
        scripts/config --disable CONFIG_USB_SUPPORT
        
        # أساسيات النظام والإشعارات (Core System Essentials)
        scripts/config --enable CONFIG_BINFMT_ELF
        scripts/config --enable CONFIG_UNIX
        scripts/config --enable CONFIG_INET
        scripts/config --enable CONFIG_IPV6
        scripts/config --enable CONFIG_DEVTMPFS
        scripts/config --enable CONFIG_DEVTMPFS_MOUNT
        
        # الشبكات المتقدمة للـ Pentest والـ VPN (Packet Sockets, TUN/TAP)
        scripts/config --enable CONFIG_PACKET
        scripts/config --enable CONFIG_PACKET_DIAG
        scripts/config --enable CONFIG_TUN
        
        # تفعيل تعريفات VirtIO المحورية لـ QEMU
        scripts/config --enable CONFIG_VIRTIO_MENU
        scripts/config --enable CONFIG_VIRTIO_MMIO
        scripts/config --enable CONFIG_VIRTIO_PCI
        scripts/config --enable CONFIG_VIRTIO_BLK
        scripts/config --enable CONFIG_VIRTIO_NET
        scripts/config --enable CONFIG_VIRTIO_CONSOLE
        scripts/config --enable CONFIG_SCSI_VIRTIO
        
        # دعم منفذ Serial ttyAMA0
        scripts/config --enable CONFIG_SERIAL_AMBA_PL011
        scripts/config --enable CONFIG_SERIAL_AMBA_PL011_CONSOLE

        # أنظمة الملفات، الأمن، والحاويات
        scripts/config --enable CONFIG_EXT4_FS
        scripts/config --enable CONFIG_NAMESPACES
        scripts/config --enable CONFIG_USER_NS
        scripts/config --enable CONFIG_SECCOMP
        scripts/config --enable CONFIG_CGROUPS
        scripts/config --enable CONFIG_NETFILTER
        scripts/config --enable CONFIG_IP_NF_IPTABLES

        make olddefconfig

    - name: Build Kernel, Modules & DTBs
      run: |
        cd linux-src
        export ARCH=arm
        export CROSS_COMPILE=arm-linux-gnueabihf-
        
        # بناء zImage والـ Modules و DTB
        make -j$(nproc) zImage modules dtbs
        
        # تثبيت الـ modules في مجلد مؤقت
        mkdir -p ../modules_install
        make modules_install INSTALL_MOD_PATH=../modules_install

    - name: Build BusyBox & Create Complete Initramfs
      run: |
        BUSYBOX_VER="1.36.1"
        wget -q https://busybox.net/downloads/busybox-${BUSYBOX_VER}.tar.bz2
        tar -xjf busybox-${BUSYBOX_VER}.tar.bz2
        cd busybox-${BUSYBOX_VER}
        export ARCH=arm
        export CROSS_COMPILE=arm-linux-gnueabihf-
        
        make defconfig
        scripts/config --enable CONFIG_STATIC
        make olddefconfig
        make -j$(nproc) install
        
        cd ..
        cp -av busybox-${BUSYBOX_VER}/_install initramfs
        mkdir -p initramfs/{proc,sys,dev,etc,tmp,run,root,lib/modules}
        
        # دمج Kernel Modules داخل الـ Initramfs
        if [ -d "modules_install/lib/modules" ]; then
          cp -av modules_install/lib/modules/* initramfs/lib/modules/
        fi

        # سكريبت الإقلاع مع نقاط التثبيت الحاكمة
        cat << 'EOF' > initramfs/init
        #!/bin/bin/busybox sh
        mount -t proc proc /proc
        mount -t sysfs sysfs /sys
        mount -t devtmpfs dev /dev
        mount -t tmpfs tmpfs /tmp
        mount -t tmpfs tmpfs /run
        
        echo "=========================================="
        echo "   Welcome to VXLinux Kernel v1.0 (ARM)   "
        echo "=========================================="
        
        exec /bin/sh
        EOF
        chmod +x initramfs/init

        cd initramfs
        find . -print0 | cpio --null -ov --format=newc | gzip -9 > ../initramfs.gz

    - name: Organize & Compress Artifacts
      run: |
        mkdir -p output/dts
        
        # 1. نسخ النواة والـ Initramfs
        cp linux-src/arch/arm/boot/zImage output/
        cp initramfs.gz output/
        
        # 2. نسخ الـ DTBs من المسار الصحيح المباشر في Linux 6.6
        cp linux-src/arch/arm/boot/dts/*.dtb output/dts/ 2>/dev/null || true
        
        # 3. حفظ ملفات إعادة البناء والتشخيص
        cp linux-src/.config output/kernel.config
        cp linux-src/System.map output/
        cp linux-src/Module.symvers output/ 2>/dev/null || true

        # الضغط بأعلى كفاءة
        cd output
        zip -9 -r VXLinux-v1.0-ARM.zip zImage initramfs.gz dts kernel.config System.map Module.symvers

    - name: Upload Compressed VXLinux Package
      uses: actions/upload-artifact@v4
      with:
        name: VXLinux-v1.0-ARM-Compressed
        path: output/VXLinux-v1.0-ARM.zip
